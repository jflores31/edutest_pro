worker_processes auto;
events { worker_connections 1024; use epoll; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    server_tokens off;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 15M;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=admin:10m rate=10r/m;

    upstream backend  { server backend:8000;  keepalive 16; }
    upstream frontend { server frontend:80;   keepalive 8;  }

    server {
        listen 80;
        server_name _;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' https://*.sentry.io; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

        location /api/v1/auth/login/ {
            limit_req zone=login burst=10 nodelay;
            proxy_pass http://backend;
            include /etc/nginx/conf.d/proxy_params.conf;
        }

        location /api/ {
            limit_req zone=api burst=60 nodelay;
            proxy_pass http://backend;
            include /etc/nginx/conf.d/proxy_params.conf;
            add_header Cache-Control "no-store" always;
        }

        location /admin/ {
            limit_req zone=admin burst=10 nodelay;
            proxy_pass http://backend;
            include /etc/nginx/conf.d/proxy_params.conf;
        }

        location /static/ {
            alias /vol/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location /media/ {
            alias /vol/media/;
            expires 7d;
            add_header X-Content-Type-Options "nosniff" always;
        }

        location /api/health/ {
            proxy_pass http://backend;
            access_log off;
        }

        location / {
            proxy_pass http://frontend;
            include /etc/nginx/conf.d/proxy_params.conf;
        }

        location ~ /\. {
            deny all;
        }
    }
}
