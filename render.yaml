# Render Blueprint for the EduTest Pro backend (Django + Gunicorn).
# Deploy: push this repo to GitHub, then "New > Blueprint" in Render and point it here.
# All secret values (SECRET_KEY, POSTGRES_*, CACHE_URL) are set in the Render dashboard,
# NOT committed here.
#
# Periodic abandonment detection is handled by a free GitHub Actions cron
# (.github/workflows/detect-abandoned.yml), so no paid Render cron job is required.
services:
  - type: web
    name: edutest-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput"
    # Runs once per deploy, after build, before traffic switches. Seeds demo data
    # only when SEED_ON_DEPLOY=true (idempotent: seed_data uses get_or_create).
    preDeployCommand: "python manage.py migrate --noinput && (if [ \"$SEED_ON_DEPLOY\" = \"true\" ]; then python manage.py seed_data; fi)"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    healthCheckPath: /api/health/
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: DEBUG
        value: "False"
      # Set to "true" once to seed demo data (admin/Admin1234!), then back to "false".
      - key: SEED_ON_DEPLOY
        sync: false
      # ── Secrets: set these in the Render dashboard (sync:false = not in repo) ──
      - key: SECRET_KEY
        sync: false
      - key: ALLOWED_HOSTS
        sync: false            # e.g. edutest-backend.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        sync: false            # e.g. https://your-app.vercel.app
      - key: CORS_ALLOWED_ORIGINS
        sync: false            # e.g. https://your-app.vercel.app
      - key: POSTGRES_DB
        sync: false
      - key: POSTGRES_USER
        sync: false
      - key: POSTGRES_PASSWORD
        sync: false
      - key: POSTGRES_HOST
        sync: false            # Supabase session-pooler host (...pooler.supabase.com)
      - key: POSTGRES_PORT
        value: "5432"          # Session pooler: persistent server, supports cursors.
                               # If you must use the transaction pooler (6543), also set
                               # DB_CONN_MAX_AGE=0 and DB_DISABLE_SERVER_SIDE_CURSORS=True.
      - key: POSTGRES_SSLMODE
        value: "require"
      - key: CACHE_URL
        sync: false            # Upstash rediss:// URL
      # ── Production security (TLS terminated by Render's proxy) ──
      - key: SECURE_PROXY_SSL_HEADER
        value: "True"
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: SECURE_HSTS_SECONDS
        value: "31536000"
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: CSRF_COOKIE_SECURE
        value: "True"
