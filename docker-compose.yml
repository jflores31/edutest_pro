services:

  postgres:
    image: postgres:16-alpine
    container_name: edutest_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-edutest}
      POSTGRES_USER: ${POSTGRES_USER:-edutest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-edutest123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-127.0.0.1:5433:5432}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-edutest}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend_net

  redis:
    image: redis:7-alpine
    container_name: edutest_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-127.0.0.1:6380:6379}"
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=\"${REDIS_PASSWORD:-redis123}\" redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edutest_backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health/')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edutest_celery
    restart: unless-stopped
    command: celery -A config.celery worker --loglevel=info --concurrency=2
    env_file: .env
    volumes:
      - media_files:/app/media
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - backend_net

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edutest_celery_beat
    restart: unless-stopped
    command: celery -A config.celery beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - backend_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: edutest_frontend
    restart: unless-stopped
    networks:
      - frontend_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  nginx:
    image: nginx:1.27-alpine
    container_name: edutest_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/proxy_params.conf:/etc/nginx/conf.d/proxy_params.conf:ro
      - static_files:/vol/static:ro
      - media_files:/vol/media:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - frontend_net
      - backend_net

volumes:
  postgres_data:
  redis_data:
  static_files:
  media_files:

networks:
  backend_net:
    driver: bridge
  frontend_net:
    driver: bridge
